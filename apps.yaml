projects:
  internal-tools:
    description: "Project for internal tools like Argo CD, Ingress Controller, etc."
    namespace: argocd
    sourceRepos: ['*']
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    clusterResourceWhitelist:
    - group: '*'
      kind: '*'
    destinations:
      - namespace: '*'
        server: '*'

applications:
  argo-cd:
    namespace: argocd
    project: internal-tools
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.5.11  
      helm:
        releaseName: argocd
        values: |
          configs:
            params:
              server.insecure: true
          global:
            domain: argocd.local
          server:
            extraArgs: ["--insecure"]
            # ingress:
            #   enabled: true
            #   ingressClassName: nginx
            #   hostname: argocd.local
            #   tls: false
            httproute:
              enabled: true
              parentRefs:
                - group: gateway.networking.k8s.io
                  kind: Gateway
                  name: traefik-gateway
                  namespace: traefik
                  sectionName: web
              hostnames:
                - argocd.local
                - argocd.test
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true

  # ingress-nginx:
