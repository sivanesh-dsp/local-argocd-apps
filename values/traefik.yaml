deployment:
  kind: DaemonSet
  dnsPolicy: ClusterFirstWithHostNet
updateStrategy:
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1
hostNetwork: true
# Instead of running Traefik as root, I have set `net.ipv4.ip_unprivileged_port_start=0` on worker nodes
# securityContext:
#   allowPrivilegeEscalation: false
#   capabilities:
#     add:
#       - NET_BIND_SERVICE
#     drop:
#       - ALL
#   readOnlyRootFilesystem: true
# podSecurityContext:
#   runAsGroup: 0
#   runAsNonRoot: false
#   runAsUser: 0
service:
  type: ClusterIP
providers:
  kubernetesGateway:
    enabled: true
  kubernetesIngress:
    enabled: false
gateway:
  enabled: true
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All
ingressClass:
  enabled: false
  isDefaultClass: false
ports:
  metrics:
    port: 9180
    exposedPort: 9180
  web:
    port: 80
    exposedPort: 80
  websecure:
    port: 443
    exposedPort: 443
