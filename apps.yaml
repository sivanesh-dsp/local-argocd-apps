  traefik:
    project: internal-tools
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    source:
      repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 39.0.8
      helm:
        releaseName: traefik
        values: |
          deployment:
            kind: DaemonSet
            dnsPolicy: ClusterFirstWithHostNet
          updateStrategy:
            rollingUpdate:
              maxSurge: 0
              maxUnavailable: 1
          hostNetwork: true
          # Instead of running Traefik as root, I have set `net.ipv4.ip_unprivileged_port_start=0` on worker nodes
          # securityContext:
          #   allowPrivilegeEscalation: false
          #   capabilities:
          #     add:
          #       - NET_BIND_SERVICE
          #     drop:
          #       - ALL
          #   readOnlyRootFilesystem: true
          # podSecurityContext:
          #   runAsGroup: 0
          #   runAsNonRoot: false
          #   runAsUser: 0
          service:
            type: ClusterIP
          providers:
            kubernetesGateway:
              enabled: true
            kubernetesIngress:
              enabled: false
          gateway:
            enabled: true
            listeners:
              web:
                port: 80
                protocol: HTTP
                namespacePolicy:
                  from: All
          ingressClass:
            enabled: false
            isDefaultClass: false
          ports:
            metrics:
              port: 9180
              exposedPort: 9180
            web:
              port: 80
              exposedPort: 80
            websecure:
              port: 443
              exposedPort: 443
    destination:
      server: https://kubernetes.default.svc
      namespace: traefik
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true

  prometheus:
    project: internal-tools
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/compare-options: ServerSideDiff=true
    source:
      repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus
      targetRevision: 29.4.0
      helm:
        releaseName: prometheus
        values: |
          server:
            persistentVolume:
              size: 1Gi
            retention: "3d"
            route:
              main:
                enabled: true
                parentRefs:
                  - group: gateway.networking.k8s.io
                    kind: Gateway
                    name: traefik-gateway
                    namespace: traefik
                    sectionName: web
                hostnames:
                  - prometheus.local
          prometheus-pushgateway:
            enabled: false
          alertmanager:
            enabled: false
    destination:
      server: https://kubernetes.default.svc
      namespace: monitoring
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true
