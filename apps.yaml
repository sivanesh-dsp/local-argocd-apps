projects:
  internal-tools:
    description: "Project for internal tools like Argo CD, Ingress Controller, etc."
    namespace: argocd
    sourceRepos: ['*']
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    clusterResourceWhitelist:
    - group: '*'
      kind: '*'
    destinations:
      - namespace: '*'
        server: '*'

applications:
  argo-cd:
    namespace: argocd
    project: internal-tools
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    sources:
      - repoURL: https://argoproj.github.io/argo-helm
        chart: argo-cd
        targetRevision: 9.5.11
        helm:
          releaseName: argocd
          valueFiles:
            - $repo/values/argo-cd.yaml
      - repoURL: https://github.com/sivanesh-dsp/local-argocd-apps.git
        targetRevision: main
        ref: repo
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true

  traefik:
    project: internal-tools
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    sources:
      - repoURL: https://traefik.github.io/charts
        chart: traefik
        targetRevision: 39.0.8
        helm:
          releaseName: traefik
          valueFiles:
            - $repo/values/traefik.yaml
      - repoURL: https://github.com/sivanesh-dsp/local-argocd-apps.git
        targetRevision: main
        ref: repo
    destination:
      server: https://kubernetes.default.svc
      namespace: traefik
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true

  prometheus:
    project: internal-tools
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    additionalAnnotations:
      argocd.argoproj.io/compare-options: ServerSideDiff=true
    sources:
      - repoURL: https://prometheus-community.github.io/helm-charts
        chart: prometheus
        targetRevision: 29.4.0
        helm:
          releaseName: prometheus
          valueFiles:
            - $repo/values/prometheus.yaml
      - repoURL: https://github.com/sivanesh-dsp/local-argocd-apps.git
        targetRevision: main
        ref: repo
    destination:
      server: https://kubernetes.default.svc
      namespace: monitoring
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true

  grafana:
    project: internal-tools
    namespace: argocd
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    sources:
      - repoURL: https://grafana-community.github.io/helm-charts/
        chart: grafana
        targetRevision: 12.3.0
        helm:
          releaseName: grafana
          valueFiles:
            - $repo/values/grafana.yaml
      - repoURL: https://github.com/sivanesh-dsp/local-argocd-apps.git
        targetRevision: main
        ref: repo
    destination:
      server: https://kubernetes.default.svc
      namespace: monitoring
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - ServerSideApply=true
        - ApplyOutOfSyncOnly=true
